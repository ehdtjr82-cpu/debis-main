<html>

<script src="/common/script/common.js" language="JScript"></script>
<script>
var errObj = window.dialogArguments;
var msg = errObj.errMsg;

function f_SetMsg() {

}
</script>

<body bgcolor="#FFFFFF" text="#000000" leftmargin="5" topmargin="5" onload="f_SetMsg()">

    <td align="center">
      <div style="width:450; height:330; text-align:left; overflow:auto">
        <textarea id="txa_Msg" cols="120" rows="100" style="overflow:auto" class="input_textarea" readOnly>
        </textarea>
      </div>
    </td>
  </tr>
  <tr height="25">
    <td align="center">
      <a href="#" onClick="window.close();">확인</a>
    </td>
  </tr>
</table>
